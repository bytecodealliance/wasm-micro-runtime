name: compilation on zephyr

on:
  # will be triggered on PR events
  pull_request:
    types:
      - opened
      - synchronize
    paths:
      - ".github/**"
      - "build-scripts/**"
      - "core/**"
      - "!core/deps/**"
      - "product-mini/platforms/common/**"
      - "product-mini/platforms/zephyr/**"
      - "samples/**"
      - "!samples/workload/**"
      - "tests/wamr-test-suites/**"
      - "wamr-compiler/**"
  # will be triggered on push events
  push:
    branches:
      - main
      - "dev/**"
    paths:
      - ".github/**"
      - "build-scripts/**"
      - "core/**"
      - "!core/deps/**"
      - "product-mini/platforms/common/**"
      - "product-mini/platforms/zephyr/**"
      - "samples/**"
      - "!samples/workload/**"
      - "tests/wamr-test-suites/**"
      - "wamr-compiler/**"
  # allow to be triggered manually
  workflow_dispatch:

# Cancel any in-flight jobs for the same PR/branch so there's only one active
# at a time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # FOR SETUP
  ZEPHYR_SDK_VERSION: "0.16.9"
  ZEPHYR_VERSION: "v3.7.0"
  # FOR BUILD

permissions:
  contents: read

jobs:
  smoke_test:
    runs-on: zephyr-runner

    container:
      # For Zephyr 3.7 LTS, use the v0.26-branch or the latest v0.26.x release Docker image.
      image: ghcr.io/zephyrproject-rtos/ci:v0.26-branch
      options: --user root

